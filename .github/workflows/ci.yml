# CI for OpenARaw.
#
# Jobs:
#   build - cargo fmt --check, cargo clippy -D warnings, cargo test
#           (Linux + macOS + Windows, mirroring publish.yml's wheel matrix)
#
# There is no corpus-download validation job yet (unlike OpenTFRaw's
# single-file .raw fixture): the corpus this reader validates against is
# whole .d *directories*, which PRIDE does not expose as a single stable
# download URL the way it does individual Thermo .raw files, so a CI-time
# fixture fetch isn't a simple 1:1 port of that pattern. Revisit once a
# small, CI-friendly .d fixture (or a synthetic one) is available.

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  build:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets

  docs:
    name: Docs (Docusaurus)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: bun install
        run: bun install --frozen-lockfile
      - name: bun run build:cloudflare
        run: bun run build:cloudflare
